<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Mess - Scan Food</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700&amp;family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#523c00",
                        "secondary-fixed": "#ffdf9e",
                        "surface-dim": "#e4e3d6",
                        "error": "#b23d21",
                        "tertiary-container": "#ff9f99",
                        "surface": "#fcffde",
                        "surface-tint": "#00751f",
                        "secondary": "#805f00",
                        "surface-container": "#f6f3eb",
                        "error-container": "#fa7150",
                        "primary-container": "#91f78e",
                        "inverse-surface": "#0e0e0c",
                        "on-tertiary-container": "#74000e",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#83e881",
                        "error-dim": "#821a01",
                        "primary-dim": "#00671a",
                        "inverse-primary": "#91f78e",
                        "inverse-on-surface": "#9f9d98",
                        "tertiary-fixed-dim": "#ff8983",
                        "primary-fixed": "#91f78e",
                        "surface-container-highest": "#eae8dd",
                        "secondary-fixed-dim": "#ffce5d",
                        "on-background": "#383831",
                        "on-secondary-fixed-variant": "#755700",
                        "on-primary-fixed": "#00480f",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#00691a",
                        "on-tertiary-fixed": "#4a0006",
                        "outline": "#818177",
                        "background": "#fcffde",
                        "secondary-dim": "#715400",
                        "surface-container-high": "#f0eee4",
                        "on-surface": "#383831",
                        "tertiary": "#c1242c",
                        "secondary-container": "#ffdf9e",
                        "outline-variant": "#bbbaaf",
                        "tertiary-dim": "#b01422",
                        "tertiary-fixed": "#ff9f99",
                        "on-tertiary-fixed-variant": "#850012",
                        "on-primary-container": "#005e17",
                        "on-surface-variant": "#65655c",
                        "surface-bright": "#fcffde",
                        "primary": "#00751f",
                        "surface-container-low": "#fcf9f2",
                        "on-primary": "#ffffff",
                        "on-error-container": "#671200",
                        "surface-variant": "#eae8dd",
                        "on-secondary-container": "#694d00"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scan-bracket {
            width: 40px;
            height: 40px;
            border-color: #91f78e;
            position: absolute;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black font-body text-on-surface selection:bg-primary-container overflow-hidden h-screen">
<!-- Camera Viewport Simulation -->
<div class="relative h-screen w-full overflow-hidden">
<img alt="Camera Preview" class="absolute inset-0 w-full h-full object-cover" data-alt="top-down high-end editorial photo of a fresh mediterranean salmon bowl with greens, quinoa and lemon on a neutral stone table" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJ7dloG57A_F5U1oGJU7LyFVrwWnTf9aDID8QYUhf9OHHuisGJY4wsVCanuPYHDCGqKmJHpYQM_-xfBIgH4EB-K753GlC9KLTd0DSTb4HHLhlYO7CEiTQWzwhxoXnzFEc3J8tClMM4wCKqhV55BomhDBfIoFmr9jrfE_V0bEZfJcG-eSMZK5Yw7RwU3xpd_7vfMLOGewSVBhkGBk3SL98SfoDw3bYo73d_h1eJ9xI2y4t1LphcOeDb_YRDcZbBTu_G2V80_O9we_f3"/>
<!-- Dark Overlay for Contrast -->
<div class="absolute inset-0 bg-black/20"></div>
<!-- Top App Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 bg-[#fcffde]/80 dark:bg-[#1a1c1e]/80 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full shadow-[0_20px_40px_rgba(56,56,49,0.06)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container">
<img alt="Student Profile Avatar" data-alt="professional headshot of a student smiling, soft natural lighting, clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMzNPcqLONfOIKBDn3COodUEhoL6EbupsGI68_JDEpfyJMl8jJZHXyYVT9HYXXE4xiNkgPmbARJqEOjGYiVUh_IfyADiJC0L-zAG3ecKsi9SYjejVJL9D015nsJXkNpKxd2KUtX5kj8ygw9fOxquvvAHqYwIhqnOKT4_PY8xMTKVLSNibl36q-s1iCXTV6HYlcHswI3VNyIMJDBTH8pPvX5opqedQ5tsuSx6_AXe2Se7sljWbeDw_ioqdd03pa8w_fonQH8F7wwL5r"/>
</div>
<h1 class="font-headline font-bold tracking-tight text-xl text-[#00751f] dark:text-[#91f78e]">Smart Mess</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#fcf9f2] dark:hover:bg-[#2a2c2e] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#00751f] dark:text-[#91f78e]" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Scan Frame Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative w-72 h-72">
<!-- Brackets -->
<div class="scan-bracket top-0 left-0 border-t-4 border-l-4 rounded-tl-xl"></div>
<div class="scan-bracket top-0 right-0 border-t-4 border-r-4 rounded-tr-xl"></div>
<div class="scan-bracket bottom-0 left-0 border-b-4 border-l-4 rounded-bl-xl"></div>
<div class="scan-bracket bottom-0 right-0 border-b-4 border-r-4 rounded-br-xl"></div>
<!-- Scanning Line -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary shadow-[0_0_15px_#91f78e] animate-[scan_3s_ease-in-out_infinite]"></div>
</div>
</div>
<!-- Camera Controls -->
<div class="absolute bottom-48 w-full px-8 flex flex-col items-center gap-8">
<!-- Zoom Slider -->
<div class="w-full max-w-xs bg-black/40 backdrop-blur-md px-6 py-3 rounded-full flex items-center gap-4">
<span class="text-white text-xs font-bold">1x</span>
<input class="flex-grow accent-primary-fixed h-1 bg-white/20 rounded-lg appearance-none cursor-pointer" type="range"/>
<span class="text-white text-xs font-bold">5x</span>
</div>
<!-- Capture Button -->
<div class="relative">
<button class="w-20 h-20 bg-white rounded-full flex items-center justify-center p-1 active:scale-90 transition-transform shadow-2xl">
<div class="w-full h-full bg-black rounded-full border-4 border-white"></div>
</button>
</div>
</div>
<!-- Result Slide-up Bottom Sheet -->
<div class="fixed bottom-0 left-0 right-0 z-50 bg-surface rounded-t-xl px-6 pt-4 pb-32 shadow-[0_-20px_50px_rgba(0,0,0,0.2)]">
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full mx-auto mb-6"></div>
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="font-headline text-2xl text-on-surface font-bold tracking-tight">Grilled Salmon Bowl</h2>
<p class="text-on-surface-variant font-medium">Estimated weight: <span class="text-primary font-bold">340g</span></p>
</div>
<span class="bg-primary-container text-on-primary-container px-3 py-1 rounded-full text-xs font-bold">HIGH PROTEIN</span>
</div>
<!-- Macro Breakdown Bento Grid -->
<div class="grid grid-cols-3 gap-3 mb-8">
<div class="bg-surface-container-low p-4 rounded-lg flex flex-col items-center text-center">
<span class="text-xs font-bold text-on-surface-variant mb-1">PROTEIN</span>
<span class="text-lg font-headline font-bold text-primary">32g</span>
</div>
<div class="bg-surface-container-low p-4 rounded-lg flex flex-col items-center text-center">
<span class="text-xs font-bold text-on-surface-variant mb-1">CARBS</span>
<span class="text-lg font-headline font-bold text-secondary">45g</span>
</div>
<div class="bg-surface-container-low p-4 rounded-lg flex flex-col items-center text-center">
<span class="text-xs font-bold text-on-surface-variant mb-1">FATS</span>
<span class="text-lg font-headline font-bold text-tertiary">14g</span>
</div>
</div>
<button class="w-full bg-primary text-on-primary py-5 rounded-full font-bold text-lg shadow-lg shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="add_task">add_task</span>
                Add to my meal log
            </button>
</div>
<!-- Bottom Navigation (Shared Component Strategy) -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[3rem] bg-[#fcffde]/80 dark:bg-[#1a1c1e]/80 backdrop-blur-md flex justify-around items-end pb-6 pt-2 px-4 w-full shadow-[0_-10px_30px_rgba(56,56,49,0.04)]">
<div class="flex flex-col items-center justify-center text-[#65655c] dark:text-[#bbbaaf] p-2 hover:text-[#00751f] transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] font-medium text-[10px]">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-[#65655c] dark:text-[#bbbaaf] p-2 hover:text-[#00751f] transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] font-medium text-[10px]">History</span>
</div>
<!-- Active Tab: Scan -->
<div class="flex flex-col items-center justify-center bg-[#00751f] text-white rounded-full p-3 mb-2 shadow-lg shadow-[#00751f]/20 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
<span class="font-['Inter'] font-medium text-[10px]">Scan</span>
</div>
<div class="flex flex-col items-center justify-center text-[#65655c] dark:text-[#bbbaaf] p-2 hover:text-[#00751f] transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
<span class="font-['Inter'] font-medium text-[10px]">Menu</span>
</div>
<div class="flex flex-col items-center justify-center text-[#65655c] dark:text-[#bbbaaf] p-2 hover:text-[#00751f] transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] font-medium text-[10px]">Profile</span>
</div>
</nav>
</div>
<style>
        @keyframes scan {
            0%, 100% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</body></html>
