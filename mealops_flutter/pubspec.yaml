name: mealops_flutter
description: "A production-ready Flutter app for VIT Chennai smart hostel mess nutrition tracking."
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.5.0+1
  flutter_secure_storage: ^9.2.2
  fl_chart: ^0.68.0
  camera: ^0.11.0+2
  path: ^1.9.0
  path_provider: ^2.1.3
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  jwt_decoder: ^2.0.1
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - .env
